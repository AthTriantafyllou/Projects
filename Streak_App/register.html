<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Register</title>

  <link rel="stylesheet" href="/streaks/assets/css/main.css" />
  <link rel="stylesheet" href="/streaks/assets/css/login.css" />

  <script type="module" src="/streaks/assets/js/register.js"></script>

  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="YourApp">

<link rel="apple-touch-icon" href="/streaks/icons/icon-192.png">
<link rel="manifest" href="/streaks/manifest.json">
</head>
<body>

  <div class="auth-page">
    <div class="auth-card auth-reverse">

      <!-- LEFT: LOGIN CTA -->
      <div class="auth-right">
        <h2>Already here!</h2>

        <p>
          Welcome back!<br />
          If you are already a user sign in from here
        </p>

        <a
          href="/streaks/pages/login.html"
          class="auth-outline-btn"
        >
          SIGN IN
        </a>
      </div>

      <!-- RIGHT: REGISTER FORM -->
      <div class="auth-left">
        <h1>Register</h1>

        <p class="auth-subtitle">
          Sign up now and build a habit with us
        </p>

        <form id="register-form" class="auth-form">
          <input
            type="email"
            id="email"
            placeholder="Enter E-mail"
            required
          />

          <input
            type="password"
            id="password"
            placeholder="Enter Password"
            required
          />

          <button type="submit" class="auth-primary-btn">
            REGISTER
          </button>

          <a href="/streaks/pages/login.html" class="auth-mobile-link">
            Already have an account? Sign in
          </a>

        </form>
      </div>

    </div>
  </div>


  <script src="/streaks/assets/js/main.js"></script>

</body>
</html>
