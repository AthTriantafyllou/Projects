<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Activity</title>
  <link rel="stylesheet" href="/streaks/assets/css/main.css" />
  <link rel="stylesheet" href="/streaks/assets/css/app.css" />
  <script src="/streaks/assets/js/main.js"></script>
  <script type="module" src="/streaks/assets/js/activity.js"></script>

  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="YourApp">
<meta name="theme-color" content="#dddddd">

<link rel="apple-touch-icon" href="/streaks/icons/icon-192.png">
<link rel="manifest" href="/streaks/manifest.json">
</head>
<body>

  <div class="app-bg">
    <div class="app-frame">

      <main class="app-content activity-page">

        <!-- Header -->
        <header class="activity-header">

          <h1 id="activity-title" class="activity-title">Loading...</h1>

          <button id="delete-activity-btn" class="icon-btn danger" aria-label="Delete activity">
            <svg class="icon-svg" viewBox="0 0 24 24" fill="none">
              <path d="M10 11v6"/>
              <path d="M14 11v6"/>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/>
              <path d="M3 6h18"/>
              <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            </svg>
          </button>

        </header>

        <div id="activity-streak" class="activity-streak-big"></div>

        <div id="error" class="activity-error" style="display:none;"></div>

        <hr class="activities-divider" />

        <h2 class="section-title">Tasks</h2>

        <ul id="tasks-list" class="tasks-glass-list"></ul>

        <div class="activity-bottom">

          <hr class="activities-divider" />

          <div class="activity-actions">
            <button id="add-task-btn" class="action-btn glass glass-dark">
              Add Task <span>＋</span>
            </button>

            <button id="freeze-btn" class="action-btn glass glass-blue"></button>
          </div>

          <button id="stats-btn" class="action-btn glass glass-green full">
            Stats
          </button>

          <a href="/streaks/pages/home.html" class="action-btn glass glass-orange full">
            Back
          </a>

        </div>

      </main>

    </div>
  </div>

  <!-- Confirm Delete Modal -->
  <div id="confirm-overlay" class="confirm-overlay hidden">
    <div class="confirm-modal">
      <p id="confirm-text">Are you sure you want to delete this?</p>

      <div class="confirm-actions">
        <button id="confirm-cancel" type="button" class="confirm-btn cancel">Cancel</button>
        <button id="confirm-yes" type="button" class="confirm-btn danger">Yes</button>
      </div>
    </div>
  </div>


  
</body>

</html>
