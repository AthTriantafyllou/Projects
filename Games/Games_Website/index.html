<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Thanasis — Projects</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Intro -->
<div class="intro" id="intro">
  <div class="intro-name">Hi, I'm <em>Thanasis</em></div>
  <div class="cursor-stage">
    <svg class="big-cursor" viewBox="0 0 100 120" aria-hidden="true">
      <path d="M10 8 L10 88 L30 72 L42 104 L56 98 L44 66 L72 66 Z"
            fill="var(--ink)" stroke="var(--paper)" stroke-width="3" stroke-linejoin="round"/>
    </svg>
    <div class="cursor-label">press anywhere</div>
    <div class="cursor-ripple"></div>
  </div>
</div>

<!-- World canvas -->
<div class="world" id="world">
  <div class="scene" id="scene">
    <!-- cards injected by JS to keep HTML clean -->
  </div>
</div>

<!-- Chrome -->
<div class="chrome">
  <nav class="top-bar" aria-label="Primary">
    <button id="homeBtn" title="Back to start" style="display:flex; align-items:center; gap:7px;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 11.5 12 4l9 7.5V20a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1v-8.5Z"/></svg>
      <span class="label-text">Home</span>
    </button>
    <span class="sep"></span>
    <span class="dot-accent"></span>
    <span style="font-family: 'Geist Mono',monospace; font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); padding: 0 4px;">Thanasis</span>
    <span class="sep"></span>
    <a href="https://athtriantafyllou.github.io/" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/></svg>
      <span class="label-text">CV</span>
    </a>
    <a href="https://www.linkedin.com/in/athanasios-triantafyllou/" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4.98 3.5c0 1.38-1.12 2.5-2.5 2.5S0 4.88 0 3.5 1.12 1 2.48 1s2.5 1.12 2.5 2.5zM.22 8h4.5v13h-4.5V8zM7.5 8h4.3v1.78h.06c.6-1.12 2.07-2.3 4.26-2.3 4.55 0 5.4 3 5.4 6.88V21h-4.5v-5.75c0-1.37-.03-3.12-1.9-3.12-1.9 0-2.2 1.48-2.2 3.02V21h-4.5V8z"/></svg>
      <span class="label-text">LinkedIn</span>
    </a>
    <a href="https://www.instagram.com/triantafilllou/" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/></svg>
      <span class="label-text">Instagram</span>
    </a>
    <a href="mailto:hello@thanasis.me" id="mailLink">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 7 9-7"/></svg>
      <span class="label-text">Email</span>
    </a>
  </nav>

  <div class="zoom" id="zoom">
    <button id="zoomIn">+</button>
    <button id="zoomReset">◉</button>
    <button id="zoomOut">−</button>
  </div>

  <div class="minimap" id="minimap">
    <div>Map</div>
    <div class="mm-surface" id="mmSurface"></div>
  </div>

  <div class="hint">
    <span class="key">DRAG</span> to pan
    <span>·</span>
    <span class="key">SCROLL</span> to zoom
    <span>·</span>
    <span class="key">CLICK</span> to open
  </div>

</div>

<!-- Detail overlay -->
<div class="detail" id="detail">
  <div class="detail-panel" id="detailPanel">
    <button class="detail-close" id="detailClose" aria-label="Close">×</button>
    <div id="detailContent"></div>
  </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
